identity:
  author: "sawyer-shi"
  name: chunk_auditor_slice
  label:
    en_US: 3.Chunk Auditor Slice--Rule Loop(Need An Outer Loop)
    zh_Hans: 3.文档审核--单循环切片(需要添加外循环)
description:
  human:
    en_US: Audit one single chunk object against all rules (rule loop only).
    zh_Hans: 对单个切片对象与规则集执行循环审核（仅规则循环）。
  llm: Audit one single chunk object against all rules (rule loop only).
class_name: ChunkAuditorSliceTool
parameters:
  - name: model_config
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: LLM Model
      zh_Hans: LLM 模型
    form: form
    human_description:
      en_US: The LLM model to use for auditing.
      zh_Hans: 用于审核的 LLM 模型。
    llm_description: The LLM model to use for auditing.
  - name: doc_slices_text
    type: string
    required: true
    label:
      en_US: Single Chunk Text
      zh_Hans: 单切片文本
    form: llm
    human_description:
      en_US: Single chunk object JSON string (contains chunk_id/text/element refs/hash etc.).
      zh_Hans: 单个切片对象 JSON 字符串（包含 chunk_id/text/element refs/hash 等）。
    llm_description: Single chunk object JSON string.
  - name: rules_text
    type: string
    required: true
    label:
      en_US: Rules Text
      zh_Hans: 规则结果文本
    form: llm
    human_description:
      en_US: Text output from rule_loader (JSON string).
      zh_Hans: 来自 rule_loader 的 text 输出（JSON 字符串）。
    llm_description: Text output from rule_loader (JSON string).
  - name: extra_hint
    type: string
    required: false
    label:
      en_US: Extra Hint
      zh_Hans: 额外提示
    form: llm
    human_description:
      en_US: Optional extra hint. For example, "I am the first party" or "I am the second party".
      zh_Hans: 可选额外提示(例如：我是甲方 或 我是乙方)。
    llm_description: Optional extra hint.
  - name: output_language
    type: select
    required: false
    label:
      en_US: Output Language
      zh_Hans: 输出语言
    form: llm
    human_description:
      en_US: Output language. auto means detect from chunk text.
      zh_Hans: 输出语言。auto 表示根据切片文本自动识别。
    llm_description: Output language. auto means detect from chunk text.
    default: "auto"
    options:
      - value: "zh"
        label:
          en_US: Chinese
          zh_Hans: 中文
      - value: "en"
        label:
          en_US: English
          zh_Hans: 英文
      - value: "auto"
        label:
          en_US: Auto Detect
          zh_Hans: 自动识别
      - value: "ja"
        label:
          en_US: Japanese
          zh_Hans: 日文
      - value: "ko"
        label:
          en_US: Korean
          zh_Hans: 韩文
      - value: "es"
        label:
          en_US: Spanish
          zh_Hans: 西班牙文
      - value: "fr"
        label:
          en_US: French
          zh_Hans: 法文
      - value: "de"
        label:
          en_US: German
          zh_Hans: 德文
      - value: "pt"
        label:
          en_US: Portuguese
          zh_Hans: 葡萄牙文
      - value: "ru"
        label:
          en_US: Russian
          zh_Hans: 俄文
      - value: "ar"
        label:
          en_US: Arabic
          zh_Hans: 阿拉伯文
extra:
  python:
    source: tools/chunk_auditor_slice.py
