identity:
  author: "sawyer-shi"
  name: chunk_auditor
  label:
    en_US: Chunk Auditor
    zh_Hans: 文档审核
description:
  human:
    en_US: Audit a document chunk with rules.
    zh_Hans: 结合规则审核文档切片。
  llm: Audit a document chunk with rules.
class_name: ChunkAuditorTool
parameters:
  - name: model_config
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: LLM Model
      zh_Hans: LLM 模型
    form: form
    human_description:
      en_US: The LLM model to use for auditing.
      zh_Hans: 用于审核的 LLM 模型。
    llm_description: The LLM model to use for auditing.
  - name: chunk_text
    type: string
    required: true
    label:
      en_US: Chunk Text
      zh_Hans: 切片文本
    form: llm
    human_description:
      en_US: The text chunk to review.
      zh_Hans: 待审核的文本切片。
    llm_description: The text chunk to review.
  - name: chunk_id
    type: number
    required: true
    label:
      en_US: Chunk ID
      zh_Hans: 切片ID
    form: llm
    human_description:
      en_US: Chunk identifier.
      zh_Hans: 切片编号。
    llm_description: Chunk identifier.
  - name: rules
    type: string
    required: false
    label:
      en_US: Rules
      zh_Hans: 审核规则
    form: llm
    human_description:
      en_US: Rules text from Rule Loader.
      zh_Hans: 来自规则加载器的规则文本。
    llm_description: Rules text from Rule Loader.
  - name: extra_hint
    type: string
    required: false
    label:
      en_US: Extra Hint
      zh_Hans: 额外提示
    form: llm
    human_description:
      en_US: Optional extra hint.
      zh_Hans: 可选额外提示。
    llm_description: Optional extra hint.
extra:
  python:
    source: tools/chunk_auditor.py
