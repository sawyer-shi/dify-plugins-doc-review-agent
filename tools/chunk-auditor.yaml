identity:
  author: "sawyer-shi"
  name: chunk_auditor
  label:
    en_US: Chunk Auditor
    zh_Hans: 文档审核
description:
  human:
    en_US: Audit all chunks against all rules (double loop) from text inputs.
    zh_Hans: 对切片与规则执行双循环审核（来自两个 text 输入）。
  llm: Audit all chunks against all rules (double loop) from text inputs.
class_name: ChunkAuditorTool
parameters:
  - name: model_config
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: LLM Model
      zh_Hans: LLM 模型
    form: form
    human_description:
      en_US: The LLM model to use for auditing.
      zh_Hans: 用于审核的 LLM 模型。
    llm_description: The LLM model to use for auditing.
  - name: doc_slices_text
    type: string
    required: true
    label:
      en_US: Doc Slices Text
      zh_Hans: 切片结果文本
    form: llm
    human_description:
      en_US: Text output from doc_slice_parser (JSON string).
      zh_Hans: 来自 doc_slice_parser 的 text 输出（JSON 字符串）。
    llm_description: Text output from doc_slice_parser (JSON string).
  - name: rules_text
    type: string
    required: true
    label:
      en_US: Rules Text
      zh_Hans: 规则结果文本
    form: llm
    human_description:
      en_US: Text output from rule_loader (JSON string).
      zh_Hans: 来自 rule_loader 的 text 输出（JSON 字符串）。
    llm_description: Text output from rule_loader (JSON string).
  - name: extra_hint
    type: string
    required: false
    label:
      en_US: Extra Hint
      zh_Hans: 额外提示
    form: llm
    human_description:
      en_US: Optional extra hint.
      zh_Hans: 可选额外提示。
    llm_description: Optional extra hint.
extra:
  python:
    source: tools/chunk_auditor.py
