identity:
  author: "sawyer-shi"
  name: risk_aggregator
  label:
    en_US: 4.Risk Aggregator
    zh_Hans: 4.风险聚合器
description:
  human:
    en_US: Aggregate risks by matched rule_code and quote.
    zh_Hans: 按 matched_rule_code 和 quote 聚合去重风险。
  llm: Aggregate risks by matched rule_code and quote.
class_name: RiskAggregatorTool
parameters:
  - name: model_config
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: LLM Model
      zh_Hans: LLM 模型
    form: form
    human_description:
      en_US: The LLM model to use for aggregation.
      zh_Hans: 用于聚合的 LLM 模型。
    llm_description: The LLM model to use for aggregation.
  - name: raw_results
    type: string
    required: true
    label:
      en_US: Raw Results
      zh_Hans: 原始结果
    form: llm
    human_description:
      en_US: Raw audit results from multiple chunks.
      zh_Hans: 多个切片的原始审核结果。
    llm_description: Raw audit results from multiple chunks.
  - name: merge_policy
    type: select
    required: false
    label:
      en_US: Merge Policy
      zh_Hans: 合并策略
    form: llm
    human_description:
      en_US: |-
        Controls how duplicate risks are merged.
        - dedupe_by_rule_code_quote_location: same rule+quote but different locations are kept separate (safest for annotation).
        - dedupe_by_rule_code_quote: merge same rule+quote across locations.
        - dedupe_by_quote: merge by quote only, regardless of rule.
        - dedupe_by_rule_code: merge all hits under same rule code.
        - dedupe_by_chunk_rule: merge hits by chunk_id + rule code.
        - no_dedupe: keep every hit.
      zh_Hans: |-
        控制重复风险如何合并。
        - dedupe_by_rule_code_quote_location：同规则+同引用但不同位置不合并（最适合批注）。
        - dedupe_by_rule_code_quote：同规则+同引用跨位置合并。
        - dedupe_by_quote：仅按引用文本合并，不区分规则。
        - dedupe_by_rule_code：同一规则下全部命中合并。
        - dedupe_by_chunk_rule：按 chunk_id + rule_code 合并。
        - no_dedupe：不去重，保留全部命中。
    llm_description: "Merge policy for dedupe and conflict resolution among risk hits."
    default: "dedupe_by_rule_code_quote_location"
    options:
      - value: "dedupe_by_rule_code_quote_location"
        label:
          en_US: Rule+Quote+Location (recommended)
          zh_Hans: 规则+引用+位置（推荐）
        description:
          en_US: Keep same quote in different locations as separate risks.
          zh_Hans: 同句在不同位置保留为不同风险。
      - value: "dedupe_by_rule_code_quote"
        label:
          en_US: Rule+Quote (recommended)
          zh_Hans: 规则+引用（推荐）
        description:
          en_US: Merge same rule+quote across locations.
          zh_Hans: 同规则同引用跨位置合并。
      - value: "dedupe_by_quote"
        label:
          en_US: Quote only
          zh_Hans: 仅按引用去重
        description:
          en_US: Merge by quote text only.
          zh_Hans: 仅按引用文本合并。
      - value: "dedupe_by_rule_code"
        label:
          en_US: Rule only
          zh_Hans: 仅按规则去重
        description:
          en_US: Merge all hits under each rule code.
          zh_Hans: 同规则下全部命中合并。
      - value: "dedupe_by_chunk_rule"
        label:
          en_US: Chunk+Rule
          zh_Hans: 按切片+规则去重
        description:
          en_US: Merge by chunk id and rule code.
          zh_Hans: 按切片编号+规则编号合并。
      - value: "no_dedupe"
        label:
          en_US: No dedupe
          zh_Hans: 不去重
        description:
          en_US: Keep every raw hit.
          zh_Hans: 保留全部原始命中。
extra:
  python:
    source: tools/risk_aggregator.py
