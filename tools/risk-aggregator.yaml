identity:
  author: "sawyer-shi"
  name: risk_aggregator
  label:
    en_US: 4.Risk Aggregator
    zh_Hans: 4.风险聚合器
description:
  human:
    en_US: Aggregate risks by matched rule_code and quote.
    zh_Hans: 按 matched_rule_code 和 quote 聚合去重风险。
  llm: Aggregate risks by matched rule_code and quote.
class_name: RiskAggregatorTool
parameters:
  - name: model_config
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: LLM Model
      zh_Hans: LLM 模型
    form: form
    human_description:
      en_US: The LLM model to use for aggregation.
      zh_Hans: 用于聚合的 LLM 模型。
    llm_description: The LLM model to use for aggregation.
  - name: raw_results
    type: string
    required: true
    label:
      en_US: Raw Results
      zh_Hans: 原始结果
    form: llm
    human_description:
      en_US: Raw audit results from multiple chunks.
      zh_Hans: 多个切片的原始审核结果。
    llm_description: Raw audit results from multiple chunks.
  - name: merge_policy
    type: select
    required: false
    label:
      en_US: Merge Policy
      zh_Hans: 合并策略
    form: llm
    human_description:
      en_US: Policy for conflict resolution.
      zh_Hans: 冲突合并策略。
    llm_description: Policy for conflict resolution.
    default: "dedupe_by_rule_code_quote_location"
    options:
      - value: "dedupe_by_rule_code_quote_location"
        label:
          en_US: Rule+Quote+Location (recommended)
          zh_Hans: 规则+引用+位置（推荐）
      - value: "dedupe_by_rule_code_quote"
        label:
          en_US: Rule+Quote (recommended)
          zh_Hans: 规则+引用（推荐）
      - value: "dedupe_by_quote"
        label:
          en_US: Quote only
          zh_Hans: 仅按引用去重
      - value: "dedupe_by_rule_code"
        label:
          en_US: Rule only
          zh_Hans: 仅按规则去重
      - value: "dedupe_by_chunk_rule"
        label:
          en_US: Chunk+Rule
          zh_Hans: 按切片+规则去重
      - value: "no_dedupe"
        label:
          en_US: No dedupe
          zh_Hans: 不去重
extra:
  python:
    source: tools/risk_aggregator.py
