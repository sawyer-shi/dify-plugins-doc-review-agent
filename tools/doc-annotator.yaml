identity:
  author: "sawyer-shi"
  name: doc_annotator
  label:
    en_US: 5.Doc Annotator
    zh_Hans: 5.批注生成
description:
  human:
    en_US: Generate native Word comments in format [rule_code][severity] text.
    zh_Hans: 生成原生 Word 批注，格式为 [rule_code][severity] 文本。
  llm: Generate native Word comments in format [rule_code][severity] text.
class_name: DocAnnotatorTool
parameters:
  - name: model_config
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: LLM Model
      zh_Hans: LLM 模型
    form: form
    human_description:
      en_US: The LLM model to use for annotations.
      zh_Hans: 用于批注生成的 LLM 模型。
    llm_description: The LLM model to use for annotations.
  - name: upload_file
    type: file
    required: true
    label:
      en_US: File
      zh_Hans: 上传文件
    form: llm
    human_description:
      en_US: The original document file (docx only).
      zh_Hans: 原始文档文件（仅 docx）。
    llm_description: The original document file.
  - name: audit_report
    type: string
    required: true
    label:
      en_US: Audit Report
      zh_Hans: 审核报告
    form: llm
    human_description:
      en_US: The aggregated audit report JSON.
      zh_Hans: 聚合后的审核报告 JSON。
    llm_description: The aggregated audit report JSON.
  - name: annotation_style
    type: select
    required: true
    label:
      en_US: Annotation Style
      zh_Hans: 批注风格
    form: llm
    human_description:
      en_US: comment only.
      zh_Hans: 仅支持 comment。
    llm_description: Annotation style.
    default: comment
    options:
      - value: comment
        label:
          en_US: Comment
          zh_Hans: 批注
  - name: output_file_name
    type: string
    required: false
    label:
      en_US: Output File Name
      zh_Hans: 输出文件名
    form: llm
    human_description:
      en_US: The output file name without extension.
      zh_Hans: 输出文件名（不含扩展名）。
    llm_description: The output file name without extension.
  - name: apply_to_original
    type: select
    required: false
    label:
      en_US: Apply to Original
      zh_Hans: 是否修改原文
    form: llm
    human_description:
      en_US: no=only comments, yes=modify original text and add before/after in comments.
      zh_Hans: no=仅批注，yes=按建议修改原文并在批注写原文与修改后。
    llm_description: Whether to apply suggested edits to original text.
    default: "no"
    options:
      - value: "no"
        label:
          en_US: "No"
          zh_Hans: 否
      - value: "yes"
        label:
          en_US: "Yes"
          zh_Hans: 是
extra:
  python:
    source: tools/doc_annotator.py
