identity:
  author: "sawyer-shi"
  name: doc_annotator
  label:
    en_US: Doc Annotator
    zh_Hans: 文档审核结果
description:
  human:
    en_US: Generate native Word comments in format [rule_code][severity] text.
    zh_Hans: 生成原生 Word 批注，格式为 [rule_code][severity] 文本。
  llm: Generate native Word comments in format [rule_code][severity] text.
class_name: DocAnnotatorTool
parameters:
  - name: model_config
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: LLM Model
      zh_Hans: LLM 模型
    form: form
    human_description:
      en_US: The LLM model to use for annotations.
      zh_Hans: 用于批注生成的 LLM 模型。
    llm_description: The LLM model to use for annotations.
  - name: upload_file
    type: file
    required: true
    label:
      en_US: File
      zh_Hans: 上传文件
    form: llm
    human_description:
      en_US: The original document file (docx only).
      zh_Hans: 原始文档文件（仅 docx）。
    llm_description: The original document file.
  - name: audit_report
    type: string
    required: true
    label:
      en_US: Audit Report
      zh_Hans: 审核报告
    form: llm
    human_description:
      en_US: The aggregated audit report JSON.
      zh_Hans: 聚合后的审核报告 JSON。
    llm_description: The aggregated audit report JSON.
  - name: annotation_style
    type: string
    required: false
    label:
      en_US: Annotation Style
      zh_Hans: 批注风格
    form: llm
    human_description:
      en_US: comment only.
      zh_Hans: 仅支持 comment。
    llm_description: Annotation style.
    default: comment
  - name: output_file_name
    type: string
    required: false
    label:
      en_US: Output File Name
      zh_Hans: 输出文件名
    form: llm
    human_description:
      en_US: The output file name without extension.
      zh_Hans: 输出文件名（不含扩展名）。
    llm_description: The output file name without extension.
  - name: output_language
    type: select
    required: false
    label:
      en_US: Output Language
      zh_Hans: 输出语言
    form: llm
    human_description:
      en_US: Comment language. auto means detect from uploaded document/audit report.
      zh_Hans: 批注语言。auto 表示根据上传文档/审核结果自动识别。
    llm_description: Comment language. auto means detect from uploaded document/audit report.
    default: auto
    options:
      - value: zh
        label:
          en_US: Chinese
          zh_Hans: 中文
      - value: en
        label:
          en_US: English
          zh_Hans: 英文
      - value: auto
        label:
          en_US: Auto Detect
          zh_Hans: 自动识别
      - value: ja
        label:
          en_US: Japanese
          zh_Hans: 日文
      - value: ko
        label:
          en_US: Korean
          zh_Hans: 韩文
      - value: es
        label:
          en_US: Spanish
          zh_Hans: 西班牙文
      - value: fr
        label:
          en_US: French
          zh_Hans: 法文
      - value: de
        label:
          en_US: German
          zh_Hans: 德文
      - value: pt
        label:
          en_US: Portuguese
          zh_Hans: 葡萄牙文
      - value: ru
        label:
          en_US: Russian
          zh_Hans: 俄文
      - value: ar
        label:
          en_US: Arabic
          zh_Hans: 阿拉伯文
extra:
  python:
    source: tools/doc_annotator.py
