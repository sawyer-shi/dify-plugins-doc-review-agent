identity:
  author: "sawyer-shi"
  name: file_revision
  label:
    en_US: 6.File Revision--Optional Node
    zh_Hans: 6.文件修正--可选节点
description:
  human:
    en_US: Merge overlapping risk comments from doc_annotator output and optionally revise source text while keeping latest comments.
    zh_Hans: 对 doc_annotator 产出的重叠风险批注进行合并，并可按批注修改原文且保留最新批注。
  llm: Merge overlapping risk comments from doc_annotator output and optionally revise source text while keeping latest comments.
class_name: FileRevisionTool
parameters:
  - name: model_config
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: LLM Model
      zh_Hans: LLM 模型
    form: form
    human_description:
      en_US: The LLM model to use for semantic merge/selection.
      zh_Hans: 用于语义合并/选择的 LLM 模型。
    llm_description: The LLM model to use for semantic merge/selection.
  - name: upload_file
    type: file
    required: true
    label:
      en_US: File
      zh_Hans: 上传文件
    form: llm
    human_description:
      en_US: The docx file generated by doc_annotator.
      zh_Hans: 来自 doc_annotator 的 docx 文件。
    llm_description: The docx file generated by doc_annotator.
  - name: merge_strategy
    type: select
    required: true
    label:
      en_US: Merge Strategy
      zh_Hans: 批注合并策略
    form: llm
    human_description:
      en_US: Strategy used only when the same original text has multiple risk comments.
      zh_Hans: 仅在同一段原文存在多个风险批注时生效的合并策略。
    llm_description: Strategy for handling multiple comments on same original text.
    default: "keep_highest_risk"
    options:
      - value: "keep_highest_risk"
        label:
          en_US: Keep Highest Risk
          zh_Hans: 按风险等级保留批注
      - value: "keep_semantic"
        label:
          en_US: Keep Semantic Best
          zh_Hans: 按语义理解保留批注
      - value: "merge_semantic"
        label:
          en_US: Semantic Merge
          zh_Hans: 按语义理解综合批注
  - name: apply_to_original
    type: select
    required: true
    label:
      en_US: Apply to Original
      zh_Hans: 是否修改原文
    form: llm
    human_description:
      en_US: no=keep text and refresh comments, yes=apply latest revised text and keep latest comments.
      zh_Hans: no=仅刷新批注不改原文，yes=按最新批注修改原文并保留最新批注。
    llm_description: Whether to apply latest revision text to original content.
    default: "no"
    options:
      - value: "no"
        label:
          en_US: "No"
          zh_Hans: 否
      - value: "yes"
        label:
          en_US: "Yes"
          zh_Hans: 是
  - name: output_file_name
    type: string
    required: false
    label:
      en_US: Output File Name
      zh_Hans: 输出文件名
    form: llm
    human_description:
      en_US: The output file name without extension.
      zh_Hans: 输出文件名（不含扩展名）。
    llm_description: The output file name without extension.
extra:
  python:
    source: tools/file_revision.py
